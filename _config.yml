# -----------------------------------------------
# Site identity
# -----------------------------------------------
title:       "SCHH Community Guide"
description: "A resident-created, AI-powered guide to community information and local resources."
tagline:     "A resident-created companion for finding your way around community information."
url:         "https://schh.info"
baseurl:     ""

# -----------------------------------------------
# Chatbot backend (self-hosted, residents only)
# The chat client on / talks to this API. Access requires resident
# verification: the user's email is checked against the SCHH Resident
# Directory, then a one-time code is emailed (currently valid 60 days).
# -----------------------------------------------
chatbot:
  url: "https://chat.schh.info"

# -----------------------------------------------
# Analytics (Umami Cloud for now; point script at a self-hosted
# instance later if we migrate). Tracking is emitted only when
# website_id is set — leave it blank to disable entirely.
# -----------------------------------------------
analytics:
  script:     "https://cloud.umami.is/script.js"
  website_id: "9a30006d-503a-4ab5-8c01-0f0705350c03"

# -----------------------------------------------
# Navigation — rendered as the bottom tab bar on phones and the
# top-bar links on larger screens. Icons map to _includes/icon.html.
# -----------------------------------------------
nav:
  brand: "SCHH Guide"
  # Primary tab bar (phones) — hard limit of 5 slots. The desktop top
  # bar shows these plus everything under `more`.
  links:
    - text: "Ask"
      url: "/"
      icon: "chat"
    - text: "Links"
      url: "/links/"
      icon: "link"
    - text: "Vendors"
      url: "/vendors/"
      icon: "shopping-bag"
    - text: "More"
      url: "/more/"
      icon: "more-horiz"
  # Secondary destinations, listed on the /more/ page. `short` is the
  # compact label used in the desktop top bar.
  more:
    - text: "About the Guide"
      short: "About"
      url: "/about/"
      icon: "info"
    - text: "Contact Us"
      short: "Contact"
      url: "/contact/"
      icon: "mail"
    - text: "Put the Guide on Your Phone"
      short: "Install"
      url: "/install/"
      icon: "smartphone"

# -----------------------------------------------
# About page  (long-form copy lives in _data/about.yml)
# -----------------------------------------------
about:
  heading: "About the SCHH Community Guide"

# -----------------------------------------------
# Contact page
# -----------------------------------------------
contact:
  heading:      "Contact Us"
  subheading:   "Found an error? Want to suggest content? We'd love to hear from you."
  endpoint: "https://schh-contact.netlify.app/.netlify/functions/contact"

# -----------------------------------------------
# Footer
# -----------------------------------------------
footer:
  disclaimer: >-
    This is an unofficial, resident-created resource. It is not affiliated
    with, sponsored by, or endorsed by the Community Association or the
    developer.

# -----------------------------------------------
# Build settings
# -----------------------------------------------
markdown:  kramdown
permalink: pretty
