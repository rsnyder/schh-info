<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#1B4965">
    <meta name="color-scheme" content="light">

    <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/img/icon.svg" type="image/svg+xml">
    <link rel="icon" href="/img/icon-32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="SCHH Guide">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    {% if page.chat %}<link rel="stylesheet" href="/css/guide-chat.css">{% endif %}
    <link rel="stylesheet" href="/css/app.css">
    {% if page.chat %}<script src="/js/guide-chat.js" defer></script>{% endif %}
</head>
