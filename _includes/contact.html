{% assign section = site.contact %}

<!-- Contact Section -->
<section id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">{{ section.heading }}</h2>
                {% if section.subheading %}
                <h3 class="section-subheading text-muted">{{ section.subheading }}</h3>
                {% endif %}
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12">
                <!--
                    Contact form powered by Formspree (formspree.io).
                    Set contact.formspree_id in _config.yml to activate.
                -->
                <form action="https://formspree.io/f/{{ section.formspree_id }}" method="POST">
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="form-group">
                                <input type="text"  name="name"  class="form-control" placeholder="Your Name *"  required>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-group">
                                <input type="email" name="email" class="form-control" placeholder="Your Email *" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="form-group">
                                <textarea name="message" class="form-control" placeholder="Your Message *" rows="6" required></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-12 text-center" style="margin-top: 0.5rem;">
                            <button type="submit" class="btn btn-xl">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
