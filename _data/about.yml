# About section content.
# `intro` renders as plain paragraphs above the section grid.
# Each `sections` item renders as an icon-badged card.
# `closing` renders as a callout below the grid.
#
# icon: name from _includes/icon.html

intro: |-
  The SCHH Community Guide is a resident-created companion for finding your way around community information.

  The community publishes a large and valuable collection of official information — website pages, Resident Central materials, SunSations magazine, Association emails, SCTV broadcasts, forms, policies, and event announcements — but it is spread across many places and formats. The guide brings these materials together and adds AI-supported search and chat, so residents can get to the right information faster. Each answer includes links back to the official documents it drew from — often to the exact relevant page — so you can always go straight to the source.

sections:
  - icon: shield
    heading: "Independent and Unofficial"
    body: |-
      The SCHH Community Guide is independently created and maintained by residents. It is not an official Community Association website and is not sponsored, endorsed, approved, or managed by the Association, the developer, or any affiliated entity. The name, and references to official materials, are used only to help residents find relevant information — not to imply official status.

      Official websites, documents, communications, staff, committees, and Board actions remain the authoritative sources. Because community information changes frequently, residents should confirm time-sensitive, financial, policy-related, or otherwise important matters with the original official source.

  - icon: folder-open
    heading: "What the Guide Includes"
    body: |-
      The guide draws from a growing collection of community-related materials: public website content, available resident documents, newsletters, SunSations issues, Association announcements, forms, emails, SCTV content, and other community resources. It also covers the surrounding area, local services, and vendor listings from both residents and outside providers.

      It is not complete or exhaustive — think of it as an easier starting point.

  - icon: comments
    heading: "AI-Supported Search and Chat"
    body: |-
      The chat is a helpful search and discovery tool, not a final authority. AI-generated answers may be incomplete, outdated, or imperfect — review the cited source materials for anything important.

      The chatbot is available to residents only. First-time users verify residency by entering the email address listed for them in the SCHH Resident Directory; a one-time access code is sent to that address, and access then stays valid for an extended period (currently 60 days). As with any online tool, avoid including personal information in your questions.

      It is especially useful for questions like: Where can I find a form? What did a recent announcement say? What are the rules for a facility? What local services are available nearby?

  - icon: smartphone
    heading: "Use It Like an App"
    body: |-
      The guide works right in your web browser, but it can also be added to your phone or tablet's home screen, where it opens with one tap and behaves like a regular app.

      See the [step-by-step instructions](/install/) — it takes about a minute, works on iPhone, iPad, and Android devices, and doesn't require an app store.

  - icon: lock
    heading: "Privacy and Resident Information"
    body: |-
      The aggregated content in the guide has been reviewed to remove resident names, personal phone numbers, personal email addresses, and other personally identifiable information where practical. Names, roles, and contacts that already appear in public official materials may remain.

      No review process is perfect. If you find personal information that should not appear in the guide, please report it through the contact form so it can be removed.

  - icon: briefcase
    heading: "Vendor and Service Listings"
    body: |-
      The [vendor listings](/vendors/) are provided as a convenience. Inclusion does not necessarily mean endorsement, verification, or recommendation — use your own judgment when hiring vendors or using local services.

  - icon: heart
    heading: "Help Improve the Guide"
    body: |-
      This is a living resource, updated and corrected as community information changes — and residents make it better. Report errors, suggest additions, or contribute new information through the [contact form](/contact/). Submissions may be edited or reorganized to keep the guide accurate, useful, and respectful.

      Residents who would like to get more involved — reviewing content for accuracy, spotting outdated material, helping keep things current — are warmly invited to reach out the same way.

closing: |-
  The goal is simple: to provide a practical, easy-to-use companion that helps residents find and use community information more easily.
