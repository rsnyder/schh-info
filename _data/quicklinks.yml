# Quick Links page content.
#
# links:   ordinary web links, opened in a new tab
#          fields: title, url, description (optional)
# prompts: commonly used questions — tapping one opens the chat page
#          and submits the question automatically
#
# Entries marked "Sample" are placeholders — replace them with real
# community links.

links:
  - title: "National Hurricane Center"
    url: "https://www.nhc.noaa.gov"
    description: "Current tropical storm and hurricane forecasts from NOAA."

  - title: "Beaufort County Government"
