# Quick Links page — resident contact directory, grouped by category.
# Rendered by links/index.html. Each entry: title (required), plus any of:
#   phone     tap-to-call link
#   email     tap-to-email (mailto) link
#   url        website, opens in a new tab
#   address    shown as a Google Maps link
#   description short blurb
#
# Sources: SCHHCA "Contact Us", the SunSations Community Directory (July 2026),
# and the community "Who to Call in an Emergency" sheet. External (county,
# police, fire, utility) numbers were web-verified 2026-07-19 — worth a periodic
# recheck, as agency lines change. Internal 843-705-xxxx numbers are the
# Association's own published numbers.

