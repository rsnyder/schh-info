# Quick Links page: the "Important links" section, grouped by category.
# Categories and links render in file order.
#
# Each category:
#   category: display name
#   icon:     name from _includes/icon.html
#   links:    entries with fields:
#     title       (required)
#     url         website, opened in a new tab (optional)
#     phone       shown as a tap-to-call link (optional)
#     description short blurb (optional)
#   Most entries will have both url and phone; either alone is fine.
#
# The FAQ section of the page comes from _data/features.yml. Entries
# marked "Sample" are placeholders — replace them with real links.

- category: "Official"
  icon: shield
  links:
    - title: "Sample link — replace me"
      url: "https://example.com"
      phone: "(843) 555-0100"
      description: "Replace with real official links in _data/quicklinks.yml (Resident Central, the Association website, activity calendars, and so on). Entries can have a website, a phone number, or both."

- category: "Local Area"
  icon: map-marker
  links:
    - title: "Beaufort County Government"
      url: "https://www.beaufortcountysc.gov"
      description: "County services, tax information, and public notices."

- category: "Weather & Emergencies"
  icon: exclamation-triangle
  links:
    - title: "National Hurricane Center"
      url: "https://www.nhc.noaa.gov"
      description: "Current tropical storm and hurricane forecasts from NOAA."
